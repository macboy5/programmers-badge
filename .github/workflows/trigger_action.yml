name: trigger_action

on:
  push:
    branches: ['master']
  repository_dispatch:
    types: [trigger-workflow]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.0'
          cache: 'npm'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPOSITORY: ${{ secrets.GH_REPOSITORY }}
          PROGRAMMERS_ID: ${{ secrets.PROGRAMMERS_ID }}
          PROGRAMMERS_PW: ${{ secrets.PROGRAMMERS_PW }}
      - run: npm install
      - run: npm run build
      - run: |
          touch .env
          echo GH_PAT=${{ secrets.GH_PAT }} >> .env
          echo GH_REPOSITORY=${{ secrets.GH_REPOSITORY }} >> .env
          echo PROGRAMMERS_ID=${{ secrets.PROGRAMMERS_ID }} >> .env
          echo PROGRAMMERS_PW=${{ secrets.PROGRAMMERS_PW }} >> .env

      - name: Start application
        run: |
          npm run start &
          sleep 10

      - name: Debug - Check generated files
        run: |
          echo "Current directory structure:"
          ls -R
          echo "Checking static folder content:"
          ls -la static/ || echo "Static folder not found"
          echo "Git status before commit:"
          git status

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항이 있는지 명확히 확인 후 커밋
          git add static/
          
          # 변경사항이 없을 때 에러로 종료되지 않게 처리
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update programmers badge SVG"
            git push
          else
            echo "No changes detected in static folder."
          fi

      - name: Terminate workflow
        run: echo "Workflow finished after 10 seconds!"
